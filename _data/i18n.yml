    "2025-[paper-announce]-IEEE-ROMAN25": >-
      オランダ・アイントホーフェンで開催される 34th IEEE International Conference on Robot and Human Interactive Communication（[IEEE RO-MAN 2025](https://www.ro-man2025.org/)）に2件の論文が採択されました。
    "2025-[paper-announce]-IROS2025-chikhalikar": >-
      論文 [Enhancing Object Search in Indoor Spaces via Personalized Object-Factored Ontologies](https://ieeexplore.ieee.org/abstract/document/11247493) が [2025 IEEE/RSJ International Conference on Intelligent Robots and Systems（IROS 2025）](https://www.iros25.org/) に口頭発表論文として採択されました。
    "2025-[paper-announce]-SICE-FES25": >-
