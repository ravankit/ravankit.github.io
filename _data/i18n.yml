    "2024-[paper]-JSME-MechJournal-emoto": >-
      論文 "[A method for detecting wear and damage on railcar wheel tread surface using a combination of laser measurement and machine vision](https://www.jstage.jst.go.jp/article/mej/11/3/11_23-00352/_article/-char/ja/)" が JSME Mechanical Engineering Journal に採択されました。
