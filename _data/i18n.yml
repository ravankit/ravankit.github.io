    "2021-[award]-SICE-Best Paper": >-
      Journal of Control, Measurements, and System Integration（Taylor & Francis）に掲載された論文に対して、SICE Best Journal Paper Award を受賞しました。<br><br>論文タイトル: Line Segment Extraction and Polyline Mapping for Mobile Robots in Indoor Structured Environments Using Range Sensors
    "2022-[general]-RoboSymp-invitedTalk": >-
      [第27回ロボティクスシンポジア 2022](http://www.robotics-symposia.org/27th/) にて招待講演を行いました。<br><br>講演タイトル: "Robot Exploration and Mapping of Unstructured Indoor Environments using segment-based Clustering of Range Data with Uncertainty"
    "2023-[social]-RSJ-annualConference-Committee": >-
      仙台で開催された [第41回日本ロボット学会学術講演会（RSJ2023）](https://ac.rsj-web.org/2023/) の企画委員長を務めました。
    "2024-[award]-ICCCDS": >-
